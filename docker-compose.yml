services:
  backend:
    build: ./app/backend
    ports: ["8000:8000"]
    volumes:
      - ./data:/data
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./demo:/app
    ports: ["5173:5173"]
    depends_on: [backend]
